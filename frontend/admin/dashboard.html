<!DOCTYPE html>
<html>

<head>

<title>Admin Dashboard</title>

<link rel="stylesheet" href="css/admin.css">

</head>


<body>


<div class="dashboard">


<h1>Admin Dashboard</h1>


<div class="cards">


<div class="card">
<h3>Total Products</h3>
<p id="totalProducts">0</p>
</div>


<div class="card">
<h3>Total Categories</h3>
<p id="totalCategories">0</p>
</div>


<div class="card">
<h3>Total Orders</h3>
<p id="totalOrders">0</p>
</div>


<div class="card">
<h3>Today's Orders</h3>
<p id="todaysOrders">0</p>
</div>


</div>


<h2>Recent Orders</h2>


<table>

<thead>

<tr>
<th>ID</th>
<th>Customer</th>
<th>Status</th>
<th>Total</th>
<th>Date</th>
</tr>

</thead>


<tbody id="ordersTable">

</tbody>


</table>


</div>


<script src="js/dashboard.js"></script>


</body>

</html>
