<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Shawarma Stop</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  // Same brand palette as the storefront (index.html) — kept in sync intentionally.
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          green: { DEFAULT:'#1e4437', 50:'#e9f0ed', 100:'#cddbd3', 400:'#2f6350', 500:'#1e4437', 600:'#173629', 700:'#11291e', 900:'#0b1a13' },
          brick: { DEFAULT:'#d03b27', 600:'#b12f1e', 700:'#8f2517' },
          gold:  { DEFAULT:'#f4c34b', 400:'#f7d374', 600:'#dba62c' },
          cream: '#FFF8F0',
          ink:   '#1F2937'
        },
        fontFamily: {
          display: ['"El Messiri"','sans-serif'],
          body: ['"Manrope"','sans-serif'],
        },
      }
    }
  }
</script>
<style>
  body{font-family:'Manrope',sans-serif;background:#FFF8F0;color:#1F2937;}
  .font-display{font-family:'El Messiri',sans-serif;}
  .spinner{width:1.1rem;height:1.1rem;border-radius:50%;border:2.5px solid rgba(255,248,240,.35);border-top-color:#FFF8F0;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center px-4 bg-gradient-to-br from-green-700 via-green-500 to-green-700">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-cream shadow-xl mb-4">
        <svg class="w-8 h-8 text-brick" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3c3 1 5 3 5 7 0 5-3 8-5 11-2-3-5-6-5-11 0-4 2-6 5-7z"/></svg>
      </div>
      <h1 class="font-display text-2xl font-bold text-cream">Shawarma Stop</h1>
      <p class="text-cream/70 text-sm mt-1">Admin Dashboard</p>
    </div>

    <form id="login-form" class="bg-cream rounded-3xl shadow-2xl p-8" novalidate>
      <h2 class="font-display font-bold text-lg text-green-700 mb-6">Sign in</h2>

      <div id="login-error" class="hidden mb-4 bg-brick/10 border border-brick/30 text-brick text-sm rounded-xl px-4 py-3"></div>

      <div class="mb-4">
        <label for="username" class="block text-xs font-semibold text-ink/60 mb-1">Username</label>
        <input id="username" name="username" autocomplete="username" required
          class="w-full px-4 py-3 rounded-xl border border-green-100 focus:border-brick outline-none text-sm transition-colors">
      </div>

      <div class="mb-6">
        <label for="password" class="block text-xs font-semibold text-ink/60 mb-1">Password</label>
        <div class="relative">
          <input id="password" name="password" type="password" autocomplete="current-password" required
            class="w-full px-4 py-3 pr-11 rounded-xl border border-green-100 focus:border-brick outline-none text-sm transition-colors">
          <button type="button" id="toggle-password" aria-label="Show password"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-ink/40 hover:text-ink/70 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          </button>
        </div>
      </div>

      <button id="login-submit" type="submit"
        class="w-full inline-flex items-center justify-center gap-2 bg-gradient-to-r from-brick to-brick-700 hover:from-brick-600 hover:to-brick-700 text-cream font-bold py-3.5 rounded-full shadow-lg shadow-brick/30 transition disabled:opacity-70 disabled:cursor-not-allowed">
        <span id="login-btn-idle">Sign In</span>
        <span id="login-btn-loading" class="hidden items-center gap-2"><span class="spinner"></span> Signing in…</span>
      </button>
    </form>

    <p class="text-center text-cream/50 text-xs mt-6">© 2026 Shawarma Stop. Staff access only.</p>
  </div>

<script src="js/api.js"></script>
<script src="js/login.js"></script>
</body>
</html>
